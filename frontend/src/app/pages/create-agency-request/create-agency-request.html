<div class="auth-wrapper">
  <div class="register-card">
    <div class="logo-container">
      <span class="logo-dieti">Dieti</span><span class="logo-estate">Estate24</span>
    </div>
    
    <h2>Crea la tua agenzia</h2>
    <p class="subtitle">Compila i dati per inviare una richiesta di creazione agenzia</p>

    <form (ngSubmit)="onSubmit()">
      
      <div class="section-title">Dati Agenzia</div>
      <div class="form-group">
        <label>Ragione Sociale</label>
        <input type="text" name="businessName" [(ngModel)]="requestData.businessName" placeholder="Es: Real Estate S.r.l.">
      </div>

      <div class="form-group">
        <label>Nome Agenzia</label>
        <input type="text" name="agencyName" [(ngModel)]="requestData.agencyName" placeholder="Es: DietiEstate Napoli">
      </div>

      <div class="form-group">
        <label>Indirizzo Operativo</label>
        <input type="text" name="address" [(ngModel)]="requestData.address" placeholder="Via Roma, 1, Napoli">
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Telefono</label>
          <input type="text" name="phone" [(ngModel)]="requestData.phone" placeholder="081 1234567">
        </div>
        <div class="form-group">
          <label>Email Agenzia</label>
          <input type="email" name="email" [(ngModel)]="requestData.email" placeholder="info@agenzia.it">
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-title">Dati Amministratore Agenzia</div>

      <div class="form-grid">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" name="name" [(ngModel)]="requestData.name" placeholder="Nome titolare">
        </div>
        <div class="form-group">
          <label>Cognome</label>
          <input type="text" name="surname" [(ngModel)]="requestData.surname" placeholder="Cognome titolare">
        </div>
      </div>

      <div class="form-group">
        <label>Username (per l'accesso admin agenzia)</label>
        <input type="text" name="username" [(ngModel)]="requestData.username" placeholder="Scegli un username">
      </div>

      <button type="submit" class="btn-primary">Invia Richiesta</button>
    </form>

    <p class="footer-text">
      Hai già un account? <a routerLink="/auth">Accedi ora</a>
    </p>
    
    <a routerLink="/" class="back-link">← Torna alla home page</a>
  </div>
</div>
<app-footer></app-footer>
