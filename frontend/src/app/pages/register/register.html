<p>register works!</p>
<div class="auth-wrapper">
  <div class="register-card">
    <div class="logo-container">
      <span class="logo-dieti">Dieti</span><span class="logo-estate">Estate24</span>
    </div>
    
    <h2>Crea un account</h2>
    <p class="subtitle">Compila i campi per registrarti come utente privato</p>

    <form (ngSubmit)="onRegister()">
      
      <div class="form-grid">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" name="name" [(ngModel)]="registerData.name" placeholder="Mario">
          </div>
          <div class="form-group">
            <label>Cognome</label>
            <input type="text" name="surname" [(ngModel)]="registerData.surname" placeholder="Rossi">
          </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="registerData.username" placeholder="Scegli un username">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="registerData.email" placeholder="mario.rossi@example.com">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="registerData.password" placeholder="••••••••">
        <small class="hint-text">Min. 8 caratteri, 1 maiuscola, 1 minuscola, 1 numero e 1 simbolo.</small>
      </div>

      <button type="submit" class="btn-primary">Registrati</button>
    </form>

    <div class="divider"><span>oppure</span></div>

    <div class="social-grid">
      <button type="button" class="btn-social" (click)="loginWithGoogle()">
        <span class="g-icon">G</span> Registrati con Google
      </button>
    </div>

    <p class="footer-text">
      Hai già un account? <a routerLink="/auth">Accedi ora</a>
    </p>
    
    <a routerLink="/" class="back-link">← Torna alla home page</a>
  </div>
</div>
<app-footer></app-footer>
