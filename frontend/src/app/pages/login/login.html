<div class="auth-wrapper">
  <div class="login-card">
    <div class="logo-container">
      <span class="logo-dieti">Dieti</span><span class="logo-estate">Estate24</span>
    </div>

    <h2>Benvenuto!</h2>
    <p class="subtitle">Inserisci le tue credenziali per accedere</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="loginData.username" placeholder="Username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="••••••••">
      </div>

      <!--  
        <div class="forgot-link">
          <a href="#">Password dimenticata?</a>
        </div>
      -->
      <button type="submit" class="btn-primary">Accedi</button>
    </form>

    <div class="divider"><span>oppure accedi con</span></div>

    <div class="social-grid">
      <button type="button" class="btn-social" (click)="loginWithGoogle()">
        <span class="g-icon">G</span> Continua con Google
      </button>
    </div>

    <p class="footer-text">
      Non hai un account? <a routerLink="/register">Registrati ora</a><br>
      Gestisci un'attività? <a routerLink="/agency-request">Crea la tua agenzia</a>
    </p>

    <a href="#" class="back-link">← Torna alla home page</a>
  </div>
</div>
